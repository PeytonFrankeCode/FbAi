<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth Diag — The Card Huddle</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: #0c0e14; color: #edf0f7; padding: 1rem; max-width: 700px; margin: 0 auto; }
    h1 { font-size: 1.2rem; }
    button { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #2d6a4f; background: rgba(94,206,153,0.1); color: #5ece99; font-weight: 600; cursor: pointer; margin: 0.25rem 0; }
    button:hover { background: #5ece99; color: #0c0e14; }
    pre { background: #161b28; border: 1px solid #232d42; border-radius: 8px; padding: 1rem; overflow: auto; white-space: pre-wrap; word-break: break-all; font-size: 0.85rem; line-height: 1.4; }
    label { display: block; margin: 0.5rem 0 0.25rem; font-size: 0.85rem; color: #94a3b8; }
    input { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #232d42; background: #111624; color: #edf0f7; font-size: 0.9rem; box-sizing: border-box; }
    .status { padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; margin: 0.5rem 0; }
    .ok { background: rgba(94,206,153,0.1); border: 1px solid #5ece99; color: #5ece99; }
    .bad { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; color: #f87171; }
  </style>
</head>
<body>
  <h1>Auth Diagnostic</h1>
  <p>Tap a button to test the live worker. Results print below.</p>

  <button onclick="run('GET', '/api/ping')">GET /api/ping (build marker)</button>
  <button onclick="run('POST', '/api/ping', '{}')">POST /api/ping (body-parser test)</button>

  <label>Username (any value, won't be saved):</label>
  <input id="u" value="diagtest" />
  <label>Password:</label>
  <input id="p" type="text" value="diagpass123" />
  <button onclick="runRegisterDiag()">POST /api/auth/diag (full register flow)</button>
  <button onclick="runRealRegister()">POST /api/auth/register (the actual failing route)</button>

  <div id="status"></div>
  <pre id="out">Waiting...</pre>

  <script>
    async function run(method, url, body) {
      const out = document.getElementById('out');
      const status = document.getElementById('status');
      out.textContent = 'Loading ' + method + ' ' + url + '...';
      status.innerHTML = '';
      try {
        const opts = { method, headers: body ? { 'Content-Type': 'application/json' } : {} };
        if (body) opts.body = body;
        const res = await fetch(url, opts);
        const text = await res.text();
        const isHtml = text.toLowerCase().startsWith('<!doctype') || text.toLowerCase().startsWith('<html');
        status.innerHTML = '<div class="status ' + (res.ok ? 'ok' : 'bad') + '">HTTP ' + res.status + (isHtml ? ' — HTML response (Cloudflare error page)' : ' — ' + (res.ok ? 'JSON ok' : 'JSON error')) + '</div>';
        if (!isHtml) {
          try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
          catch { out.textContent = text; }
        } else {
          // Pull Ray ID out of the HTML so the user can paste it
          const m = text.match(/Ray ID:?\s*<strong[^>]*>([0-9a-f-]+)<\/strong>/i) || text.match(/Ray ID:?\s*([0-9a-f-]{10,})/i);
          out.textContent = (m ? 'Ray ID: ' + m[1] + '\n\n' : '') + text.slice(0, 800);
        }
      } catch (err) {
        status.innerHTML = '<div class="status bad">Fetch failed: ' + (err && err.message || err) + '</div>';
        out.textContent = String(err && err.stack || err);
      }
    }
    function runRegisterDiag() {
      const u = document.getElementById('u').value;
      const p = document.getElementById('p').value;
      run('POST', '/api/auth/diag', JSON.stringify({ username: u, password: p }));
    }
    function runRealRegister() {
      const u = document.getElementById('u').value + '_' + Date.now();
      const p = document.getElementById('p').value;
      run('POST', '/api/auth/register', JSON.stringify({ username: u, password: p, email: '' }));
    }
  </script>
</body>
</html>
