session:
  date: 2026-05-18
  branch: claude/fix-website-issues-YKnBS
  repo: peytonfrankecode/fbai
  prs: [225, 224, 223, 222, 221, 220, 219, 218, 217, 216, 215, 214, 213, 212, 211, 210, 209, 208]
  notes: >
