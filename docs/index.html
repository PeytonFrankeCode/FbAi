<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Card Sales Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>🏈 Football Card Sales Tracker</h1>
      <p>Search recent eBay sold listings for any football trading card</p>
    </div>
  </header>

  <main>
    <!-- Search -->
    <section class="search-section">
      <form id="search-form">
        <input
          type="text"
          id="search-input"
          placeholder="e.g. Patrick Mahomes 2020 Prizm PSA 10"
          autocomplete="off"
          required
        />
        <button type="submit" id="search-btn">🔍 Search</button>
      </form>
      <p class="search-hint">Type any player name, year, set, or grade — then hit Search</p>
      <div id="search-meta" class="search-meta hidden"></div>
    </section>

    <!-- Quick picks -->
    <section class="suggestions-section" id="suggestions-section">
      <p class="suggestions-label">Quick picks</p>
      <div class="suggestions-chips">
        <button class="chip" data-query="Patrick Mahomes Prizm">Mahomes</button>
        <button class="chip" data-query="Tom Brady Rookie">Brady RC</button>
        <button class="chip" data-query="Justin Jefferson Prizm PSA 10">J. Jefferson</button>
        <button class="chip" data-query="Josh Allen Prizm">Josh Allen</button>
        <button class="chip" data-query="Ja'Marr Chase Rookie">Ja'Marr Chase</button>
        <button class="chip" data-query="CeeDee Lamb Prizm">CeeDee Lamb</button>
        <button class="chip" data-query="Lamar Jackson Prizm">Lamar Jackson</button>
        <button class="chip" data-query="Joe Burrow Rookie PSA">Joe Burrow</button>
      </div>
    </section>

    <!-- Results -->
    <section id="results-section">
      <div id="chart-section" class="chart-section hidden">
        <h2 class="chart-title">Price Trend — Recent Sales</h2>
        <div class="chart-wrap">
          <canvas id="price-chart"></canvas>
        </div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span>Searching sold listings…</span>
      </div>

      <div id="error-message" class="error-message hidden"></div>
      <div id="results-grid" class="results-grid"></div>
    </section>
  </main>

  <footer>
    <p>Demo mode — showing realistic sample data &bull; <a href="https://www.ebay.com/sch/i.html?_nkw=football+card&LH_Sold=1" target="_blank" rel="noopener">Browse real sales on eBay ↗</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
