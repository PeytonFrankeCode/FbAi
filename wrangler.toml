name = "the-card-huddle"
main = "worker.js"
# Bumped from 2024-09-23 to pick up the latest nodejs_compat improvements.
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Replace iconv-lite (pulled in transitively by body-parser → express) with
# a UTF-8-only stub. The real package's streams.js loads at module-init and
# was the actual source of `require_streams(...) is not a function` — body-parser
# uses iconv-lite for charset detection on request bodies, which we don't need.
[alias]
"iconv-lite" = "./stubs/iconv-lite-stub.js"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first on every request and delegates static paths to ASSETS via
# env.ASSETS.fetch(). Without this, Cloudflare's SPA fallback intercepts every
# /api/* request and returns index.html, so the worker is never invoked.
run_worker_first = true

[vars]
SITE_URL = "https://thecardhuddle.com"
EBAY_APP_ID = "PeytonFr-Pfranke-PRD-6bf52af21-03e44ad8"
USE_MOCK_DATA = "false"

# Secrets — set these via `wrangler secret put <KEY>` or the Cloudflare dashboard.
# Cloudflare [vars] above are public; secrets are encrypted and only visible to the worker.
#
# After deploying, hit GET /api/health to confirm what's actually loaded. Run:
#
#   wrangler secret put EBAY_CERT_ID            # eBay OAuth client secret (For Sale search)
#   wrangler secret put EBAY_API_DATA_KEY       # ebayapidata.onrender.com bearer (Sold search)
#   wrangler secret put EBAY_VERIFICATION_TOKEN # eBay marketplace deletion notifications
#   wrangler secret put STRIPE_PUBLISHABLE_KEY  # pk_live_... or pk_test_...
#   wrangler secret put STRIPE_SECRET_KEY       # sk_live_... or sk_test_...
#   wrangler secret put STRIPE_WEBHOOK_SECRET   # whsec_... from the Stripe dashboard webhook
#   wrangler secret put MONGODB_URI             # mongodb+srv://...
#   wrangler secret put AUTH_CODE               # admin login code
#   wrangler secret put CARDSIGHTS_API_KEY
#   wrangler secret put CARDHEDGE_API_KEY
#   wrangler secret put SMTP_HOST
#   wrangler secret put SMTP_PORT
#   wrangler secret put SMTP_USER
#   wrangler secret put SMTP_PASS
#   wrangler secret put SMTP_FROM
#
# After setting Stripe secrets, also register the webhook endpoint in the
# Stripe dashboard pointing at: https://thecardhuddle.com/api/stripe/webhook

