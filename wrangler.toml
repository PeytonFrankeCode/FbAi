name = "the-card-huddle"
main = "worker.js"
# Bumped from 2024-09-23 to pick up the latest nodejs_compat improvements.
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Replace iconv-lite (pulled in transitively by body-parser → express) with
# a UTF-8-only stub. The real package's streams.js loads at module-init and
# was the actual source of `require_streams(...) is not a function` — body-parser
# uses iconv-lite for charset detection on request bodies, which we don't need.
[alias]
"iconv-lite" = "./stubs/iconv-lite-stub.js"

# Cron Trigger — fires the worker's scheduled() handler every 15 minutes to run
# price-alert checks and the scan-lead email drip. (In-process setInterval loops
# in server.js are Node-only; Workers isolates don't persist between requests.)
# The drip's own day-based delay gates + 12h throttle pace actual sends, so a
# frequent tick just keeps welcomes timely without over-emailing.
[triggers]
crons = ["*/15 * * * *"]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Worker runs first on every request and delegates static paths to ASSETS via
# env.ASSETS.fetch(). Without this, Cloudflare's SPA fallback intercepts every
# /api/* request and returns index.html, so the worker is never invoked.
run_worker_first = true

[vars]
SITE_URL = "https://thecardhuddle.com"
EBAY_APP_ID = "PeytonFr-Pfranke-PRD-6bf52af21-03e44ad8"
USE_MOCK_DATA = "false"

# Cloudflare KV namespace for persistent storage (user accounts, subscriptions,
# watchlists, etc.). Without this, data resets on every cold start.
[[kv_namespaces]]
binding = "KV"
id = "5cc96b5126ec4e57960b945fb810481f"

# Durable Object that powers live presence on The Floor — one global room
# instance tracks who's connected and relays avatar positions over
# WebSockets. SQLite-backed class so it's eligible on every plan tier
# (we only use in-memory state + sockets, no stored rows yet).
[[durable_objects.bindings]]
name = "FLOOR_ROOM"
class_name = "FloorRoom"

# Per-user inbox that fans real-time direct messages out to a collector's open
# sockets. One instance per username; in-memory sockets only, no stored rows.
[[durable_objects.bindings]]
name = "USER_INBOX"
class_name = "UserInbox"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FloorRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserInbox"]

# Secrets — set these via `wrangler secret put <KEY>` or the Cloudflare dashboard.
# Cloudflare [vars] above are public; secrets are encrypted and only visible to the worker.
#
# After deploying, hit GET /api/health to confirm what's actually loaded. Run:
#
#   wrangler secret put EBAY_CERT_ID            # eBay OAuth client secret (For Sale search)
#   # NOTE: sold-search no longer needs a server secret. Each user provides
#   # their own scrape.do token in Settings → scrape.do API key (stored on
#   # the per-user record in KV, never sent back to the client in full).
#   wrangler secret put EBAY_VERIFICATION_TOKEN # eBay marketplace deletion notifications
#   wrangler secret put STRIPE_PUBLISHABLE_KEY  # pk_live_... or pk_test_...
#   wrangler secret put STRIPE_SECRET_KEY       # sk_live_... or sk_test_...
#   wrangler secret put STRIPE_WEBHOOK_SECRET   # whsec_... from the Stripe dashboard webhook
#   wrangler secret put MONGODB_URI             # mongodb+srv://...
#   wrangler secret put AUTH_CODE               # admin login code
#   wrangler secret put CARDSIGHTS_API_KEY
#   wrangler secret put CARDHEDGE_API_KEY
#   wrangler secret put SMTP_HOST
#   wrangler secret put SMTP_PORT
#   wrangler secret put SMTP_USER
#   wrangler secret put SMTP_PASS
#   wrangler secret put SMTP_FROM
#
# After setting Stripe secrets, also register the webhook endpoint in the
# Stripe dashboard pointing at: https://thecardhuddle.com/api/stripe/webhook
#
# Social sign-in (optional, but recommended for cross-device accounts):
#   wrangler secret put GOOGLE_CLIENT_ID         # OAuth web client id from Google Cloud Console
#   wrangler secret put APPLE_CLIENT_ID          # Services ID from Apple Developer (e.g. com.thecardhuddle.web)
#
# Setup notes:
# - Google: https://console.cloud.google.com -> APIs & Services -> Credentials
#     1. Create an OAuth 2.0 Web client.
#     2. Add https://thecardhuddle.com and https://www.thecardhuddle.com as
#        "Authorized JavaScript origins".
#     3. Copy the Client ID and store it as GOOGLE_CLIENT_ID.
# - Apple: requires an Apple Developer account ($99/yr).
#     1. Apple Developer -> Identifiers -> create a Services ID
#        (e.g. com.thecardhuddle.web).
#     2. Enable "Sign In with Apple" on the Services ID and configure
#        the return URL to https://thecardhuddle.com/.
#     3. Store the Services ID (not the Bundle ID) as APPLE_CLIENT_ID.

