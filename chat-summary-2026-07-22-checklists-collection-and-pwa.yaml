checklist_data_model:
  location: "public/data/checklists/<product-id>.json + index.json"
  shape: >
    Each product = { id, name, year, brand, sport, sets:[ { id, name, category,
    totalCards, parallels:[{name, printRun|null}], cards:[{number, player,
    team?, printRun?}] } ] }. category is base | autograph | memorabilia |
    insert. team is optional (some sources list no teams). parse-2022 /
    parse-2023 / parse-2024-checklist.js parse the Beckett DOCX exports; new
    products this session were hand-parsed with one-off Node builders (in
    scratch) then written directly.
  audit: >
    node audit-checklists.js flags garbled players, bad card numbers, duplicate
    set ids, junk set names, and totalCards mismatches. Target is 0 high / 0
    medium. Remaining "low" findings are legit multi-player / multi-team cards
    that appear on two pages.

checklists_added_or_fixed:
  2022_spectra_rebuild: >
    2022-panini-spectra-football.json. Was 33 sets / 937 cards, docx-scraped
    and garbled (merged names, generic "Base" parallel placeholder, a junk
    "want to know what cards..." set). Now 34 sets / 991 cards from the pasted
    team-split checklist: correct print runs, RC stripped, AUTO PATCH kept,
    dual-player autos preserved, historical-team overrides (Marcus Allen ->
    Los Angeles Raiders). CAVEAT - source was the TEAM-SET tab which excludes
    parallels, so most sets still only carry a "Base" parallel (see
    parallels_gap).
  2025_topps_chrome: >
    2025-topps-chrome-football.json - 40 sets, 1972 cards. 400-card base (300
    vets + 100 rookies) with the full ~55-parallel rainbow + serial numbers;
    etch / image / full-set variations; 13 auto sets (incl. Rookie PREM1ERE
    Patch, 98x 1/1); relics; 17 inserts. Fixed source typos (DA-HM, "Chris PAUL
    JR."). Omitted Hidden Gems (source said "Checklist TBA") and the numberless
    Fanatics Authentics Redemption list (user's paste was cut off).
  2025_topps_chrome_sapphire: >
    2025-topps-chrome-sapphire-football.json - 14 sets, 732 cards. Same base /
