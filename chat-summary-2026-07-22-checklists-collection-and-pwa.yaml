2023_parser_fix:
  file: parse-2023-checklist.js
  source_doc: "Document (13).docx"
  problem: >
    ~292 flagged issues. Root causes in the card-splitting regex: (1) the
    card-boundary only matched a Capital+lowercase name start, so players like
    BJ Ojulari, DJ Moore, T.J. Watt, DK Metcalf, C.J. Stroud got MERGED into
    the previous card ("Kyler Murray105 BJ Ojulari /999"). (2) the glued
    print-run splitter was lazy / shortest-first, so "/350128" became "/3" +
    card #50128 - silently corrupting BOTH print runs and card numbers on cards
    that otherwise looked fine.
  fixes:
    - "Widened NAME_START to cover double-capital, initialed (C.J.) and apostrophe (L'Jarius) names."
    - "ungluePrintRuns() - resolve a glued digit run against print runs seen elsewhere on the same line, then a KNOWN_PRS table (longest-first)."
    - "Handled slash-less print runs (36 Clayton Tune 299), historical-team dash-overrides (TEAM_OVERRIDES set), mid-string print runs before subset annotations, and set names embedding a year (Retro 1993 / 2003)."
    - "Filtered Beckett page chrome from set names + card rows (TAGS footer, Previous Article, pack-odds, hockey/basketball cross-links, THIS INSERT IS NUMBERED TO /4000...)."
    - "mergeDuplicateIdSets() - merge same-id sets within a product (e.g. Ticket Stub under two sections)."
    - "Stopped category markers (Relics Autographs Checklist) being swallowed as bare section headers - recovered the Alabama Relics sets."
  result: >
    Regenerated all 46 2023 products. +1,286 cards recovered (39,205 ->
    40,491). audit-checklists.js reports 0 high / 0 medium. Base sets now hit
    true counts (Donruss/Score/Prizm 383->400, Mosaic 386->400, etc.).

parallels_gap:
  problem: >
    ~21 of the 2022/2023 team-split products (Donruss, Score, Prizm, Mosaic,
    Spectra, Absolute, Black, Certified, Gold Standard, Illusions, Impeccable,
    Legacy, Luminance, Origins, Phoenix, Plates & Patches, Prestige, Rookies &
    Stars, plus Leaf Exotic/Metal/Trinity) only carry a "Base" parallel because
    the source doc only had the TEAM-SET tab, which excludes parallel data. The
    14 master-list products DO have per-set Parallels blocks and were captured
    correctly.
  cant_fetch_online: >
    Tried WebFetch of Beckett, Cardboard Connection, cardsmithsbreaks, TCDB,
    checklistinsider, gogts, WaxZone, Cardboard Glory - ALL HTTP 403 (Cloudflare
    bot protection; the agent proxy passes through, the sites themselves block).
    WebSearch works but only returns AI summaries - reliable for base-parallel
    NAMES, but it hallucinates / guesses per-set print runs (invented "Hyper
    /75, Astral /40" then contradicted itself), even constrained to
    allowed_domains beckett.com. Decision - do NOT write search-guessed print
    runs as fact.
  resolution: >
    The reliable path is the user pasting the "Master Card List" tab (set name +
    Parallels block + numbered cards), same format that worked for the 2025
    Topps sets. User pivoted to adding 2017 products instead. Parallels backfill
    for the team-split products remains OPEN.

collection_feature_work:
  file_scope: "public/app.js, public/index.html, public/style.css"
  data_model: >
    Cards live in localStorage 'cardHuddleCollection'. Fields - name OR
    structured (player/year/brand/setName/parallel/printRun/cardNumber/team/
    category); purchasePrice (Paid); estValue (Market); minPrice (NEW);
    manualValue + locked (NEW override); condition, notes, comps, estimate,
    isEstimate, soldValue, scanned. `locked` already existed and means skip
    auto-refresh - valueCardAt() and both refresh paths bail on locked cards.
  minimum_price: >
    New "minimum price you'll accept" field in the Add Card modal
    (#add-card-min) and Edit Card form (#ec-min), stored as card.minPrice. The
    portfolio tile gained a Min column; cards whose market value drops BELOW
    minPrice show a red border + "below min" flag (belowFloor in _pfCardHtml;
    CSS .pf-below-floor / .pf-floor-flag).
  mobile_money_row_fix: >
    Adding the Min column made 4 money columns (Paid/Market/Min/Gain) which
    OVERFLOWED off the right edge on phones (clipped Gain) - caught via a 360px
    Chromium screenshot. Fix - @media (max-width:560px) wraps .pf-card-money
    into a 2x2 grid; desktop keeps one row.
  manual_market_value: >
    Edit form + Add modal gained a "Market $" field. A number there sets
    estValue, marks card.manualValue + card.locked (refresh won't overwrite),
    and disables the "re-price from comps" checkbox (_ecMarketChanged). Clearing
    it reverts to auto-pricing. Manually-valued cards show a green MANUAL badge
    instead of the comp-confidence dot (_cardValueMetaInline).

pdf_export:
  goal: "On-brand Save-as-PDF of the collection (CSV stays for Excel)."
  history_of_bugs: >
    v1 opened a popup window + inline auto-print script - popup-blocked (esp.
    mobile) and unreliable. AND the ?v= asset version wasn't bumped, so browsers
    served the OLD cached app.js WITHOUT exportCollectionPDF -> "does not work".
    BOTH fixed - print via a HIDDEN IFRAME (srcdoc, no popup, focus()+print() on
    load, HTML-download fallback) + bumped versions. Then redesigned from a
    plain light table into a branded dark report.
  final_design: >
    exportCollectionPDF() (async) - near-black #0c0e14 bg + green radial glow,
    Inter font, gradient "The Card Huddle" wordmark. Logo fetched at export time
    and inlined as a data URI so it renders in the srcdoc iframe with no base
    URL. Five stat cards (Total Cards / Invested / Market Value / Total Minimum
    / Gain-Loss+ROI). Portfolio-style rows with AUTO/BASE/INSERT/MEMO badges,
    num/parallel/printrun/condition tags, Paid/Market/Min/Gain columns, red
    "below min" flags. Verified by rendering the real srcdoc in Chromium. CSV
    export also updated - added a Min Price column and uses _cardDisplayName()
    (structured name) instead of only the free-text name.

pwa_offline:
  why: "Bad venue wifi at card shows; works-at-the-show as a selling point."
  scope_chosen_by_user: "Full PWA + pre-download packs (most complete option)."
  what_works_offline: >
    App shell (instant load), viewed + pre-downloaded checklists, and the whole
    collection (localStorage). What CANNOT - live eBay/scrape.do prices; they
    degrade gracefully behind an offline banner.
  files_added:
    - "public/manifest.json - standalone display, theme/bg #0c0e14, icons 192+512 (any+maskable). Linked in <head> with apple/mobile-web-app meta. Makes it installable (Add to Home Screen, full-screen)."
    - "public/icon-192.png / icon-512.png - generated with Pillow (pip-installed ad hoc): dark brand bg + centered logo.png."
    - "public/sw.js - service worker. VERSION const drives chuddle-shell-vN / chuddle-data-vN caches, cleaned on activate. Strategy is SAME-ORIGIN ONLY (never intercepts third-party/blocking scripts or /api, so it can't stall the page on slow wifi - a real bug caught in testing where the SW hung on Chart.js / Google-Fonts fetches, leaving readyState=loading). Navigation = network-first with a 4s timeout then cached shell. /data/* + static = stale-while-revalidate. Message API - CACHE_URLS (with progress), UNCACHE_URLS, CHECK_CACHED, SKIP_WAITING."
  files_changed:
    - "public/_headers - /sw.js no-cache + Service-Worker-Allowed:/, /manifest.json no-cache."
    - "public/app.js (appended) - SW registration with SAFE auto-update (skipWaiting + reload ONLY on a genuine update, guarded by hadController so first-time visitors get no reload flash); offline-year packs (initOfflinePanel / downloadYearOffline / removeYearOffline via postMessage, tracked in localStorage 'cardHuddleOfflineYears'); offline banner (_updateOnlineStatus on online/offline events). Hooked initOfflinePanel() into showSettings()."
    - "public/index.html - #offline-banner element; Offline-at-the-show settings row (#settings-offline-row -> #offline-packs) with per-year Download/Update/Remove buttons."
    - "public/style.css - .offline-banner, .offline-packs / .op-row / .op-btn etc."
  verification: >
    End-to-end in Chromium over a local http server - SW registers and controls
    the page, manifest valid, downloading the 2017 pack cached 2/2 URLs, the
    2017 checklist (16 sets) is served from cache with the NETWORK OFF, and
    offline navigation returns the cached shell (200). Screenshotted the
    settings panel (per-year rows) and the amber offline banner.

verification_general: >
  No automated test suite. Checklist JSON validated with python json +
  audit-checklists.js. Front-end changes (portfolio tiles, PDF output, offline
  packs, banner, mobile money-row) verified by rendering the real functions/HTML
  in the pre-installed Chromium via Playwright
  (/opt/node22/lib/node_modules/playwright,
  /opt/pw-browsers/chromium-1194/chrome-linux/chrome) and reading screenshots.

