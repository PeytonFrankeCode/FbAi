    changes:
      - server.js   # remove EBAY_API_DATA_* + fetchViaEbayApiData.
                    #   add fetchViaScrapeDo + parseEbaySoldHtml
                    #   (regex extractor for s-item blocks).
                    #   fetchEbayItems threads scrapeDoKey through.
                    #   Every sold-mode call site updated:
                    #     /api/search, /api/direct-search,
                    #     /api/variants, /api/grading-advisor,
                    #     /api/auto-price, /api/auto-price/search,
                    #     /api/flip-finder, /api/market-movers,
                    #     /api/bulk-price, alert worker (skips users
                    #     without a key).
                    #   New endpoints:
                    #     GET    /api/user/scrape-do-key
                    #     PUT    /api/user/scrape-do-key
                    #     DELETE /api/user/scrape-do-key
                    #     GET    /api/debug/sold
                    #   401 noKey:true / badKey:true distinct error
                    #   shapes.
      - public/index.html # Settings → "scrape.do API key" row with
                          #   masked input, Save / Clear / Test.
      - public/app.js     # loadScrapeDoStatus, saveScrapeDoKey,
                          #   clearScrapeDoKey, testScrapeDoKey.
