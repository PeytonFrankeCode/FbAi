                          #   token + surface noKey/badKey 401 with
                          #   inline "Open Settings" button.
      - public/style.css  # scrape.do row + test-result chips.
      - wrangler.toml     # drop EBAY_API_DATA_KEY from secret list.
    commits: [ec2cef9, f65aa94]
    storage: >
      Keys live on the user record in KV (users[username].scrapeDoKey).
      API never returns the raw value — only `{ configured, hint:
      '••••••••XYZW' }` — so the token can't be exfiltrated via
      /api/user/data sync.

  - id: 14
    title: Multi-key support with round-robin + quota fallback
    request: Can users use multiple scrape.do accounts to increase
             monthly calls?
    changes:
      - server.js  # users[u].scrapeDoKeys: Array<{key,label,addedAt}>
                   # (legacy single-string scrapeDoKey still readable
                   # transparently via getUserScrapeDoKeys()).
                   # fetchViaScrapeDoRotated(query, keys, ...,
                   # rotationKey) walks keys round-robin, falls back
                   # on badKey/quotaExceeded (HTTP 402/429). Per-
                   # username rotation cursor in _scrapeDoRotation
                   # Map.
                   # Endpoints:
                   #   GET    /api/user/scrape-do-key → {configured,
                   #          count, keys[{label,hint,addedAt}]}
                   #   POST   /api/user/scrape-do-key add (label opt)
                   #   PUT    /api/user/scrape-do-key replace-all
                   #   DELETE /api/user/scrape-do-key?label=X
