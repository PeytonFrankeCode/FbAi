session:
  date: 2026-06-03
  branch: claude/project-codebase-review-ur2AR
  repo: peytonfrankecode/fbai
  notes: >
    Long-running session that continued from 2026-05-27. Covered the
    presentation deck, Browse Cards seeding, Stripe billing portal /
    promo codes / kill switch, the full EbayApiData → scrape.do
    migration with multi-key + round-robin support, 2023 + 2022 NFL
    checklist ingestion (88 new products), and a comprehensive
    parser-bug audit that cleared all HIGH/MEDIUM/LOW findings.

# ============================================================
# IMPORTANT — USER CONSTRAINTS (re-asserted from 2026-05-27)
# ============================================================
user_constraints:
  no_dev_tools:
    summary: >
      The user does NOT have access to web developer tools, no terminal,
      no curl, no wrangler CLI, no browser DevTools, no SSH, no local
      checkout. They interact with the site through the UI only and
      with the codebase through Claude Code sessions.
    do_not_do:
      - Tell the user to run any shell command themselves.
      - Tell the user to curl or inspect Network in DevTools.
      - Tell the user to "check the console" — they have no console.
      - Hand them git/npm/node/wrangler commands to execute.
    do_instead:
      - For Cloudflare secrets / env vars: walk them through the
        Cloudflare dashboard (Workers & Pages → the-card-huddle →
        Settings → Variables and Secrets).
      - For Stripe config: walk them through the Stripe Dashboard UI.
      - For verifying a config: give them a URL to paste in the
        browser address bar.
      - To inspect server behavior: build a UI-visible diagnostic
        (like the Settings → Test All button for scrape.do).
      - Run any required commands in the Claude sandbox myself; the
        user only ever interacts with the deployed site.

# ============================================================
# Work in this session
# ============================================================
