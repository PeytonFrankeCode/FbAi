                           #   All button.
      - public/app.js  # loadScrapeDoStatus renders the list,
                       #   saveScrapeDoKey POSTs, removeScrapeDoKey
                       #   DELETEs by label, testScrapeDoKey renders
                       #   per-key health.
      - public/style.css  # row styles + dashed add-form.
    commit: 03e1ce7

  - id: 15
    title: scrape.do diagnostics + eBay layout parser fixes
    request: "API is working on scrape's end but not ours" (0 listings
             from a 2 MB response).
    findings:
      - First test snippet showed page title "Patrick Mahomes 2017
        Prizm for sale | eBay" + canonical URL without LH_Sold=1 →
        eBay silently bouncing scrape.do off the sold filter to the
        active-listings page even after `super=true` + `render=true`.
      - 122 s-card blocks WERE present in the response, but the
        original parser tried to terminate each block at three
        nested </div>s — too brittle, found nothing.
    changes:
      - server.js  # fetchViaScrapeDo takes opts.includeDebug; adds
                   #   _debug payload with httpStatus, contentType,
                   #   bytes, title, canonical, classCounts (sItem,
                   #   sCard, srpItem, srpRiver), looksLikeJson,
                   #   looksLikeBlock, snippet (4 KB), firstBlock
                   #   (first matched container, 3.5 KB).
                   # scrape.do URL now includes render=true,
                   #   super=true, geoCode=us.
                   # eBay URL gains _from=R40 and _sacat=0.
                   # parseEbaySoldHtml walks 3 layouts (legacy
                   #   s-item, srp-results__item, s-card) and now
                   #   uses splitBlocks() to slice between
                   #   consecutive container openers (or 8 KB
                   #   cap on the tail) instead of guessing
                   #   nested-div closers.
                   # extractCardLayout has selectors for both
                   #   s-card__title / s-card__price / etc. AND
                   #   newer su-link / textual-display variants.
      - public/app.js  # Test button result renders title, canonical,
                       #   classCounts as inline diagnostics, plus
                       #   collapsible "Show first matched card
                       #   block" + "Show page-head snippet".
      - public/style.css  # subline + snippet pre styles.
    commits: [186a2bc, d59dfa8, 8e01f54]

# ============================================================
# Open items at end of session
# ============================================================
still_open:
  - title: eBay redirects scrape.do off the LH_Sold filter
    detail: >
      Even with scrape.do's render=true + super=true + geoCode=us,
      eBay's server-side keeps redirecting our sold-search URL to
      the active-listings page (title comes back as "X for sale |
      eBay", canonical strips LH_Sold=1). The parser now extracts
      cards correctly when it lands on a real listings page, so
      the only outstanding piece is getting onto the sold page.
      Likely next steps to try:
        - Pass a setCookies parameter to scrape.do with eBay region
          / consent cookies.
        - Try a different sold-search URL format (e.g. include
          rt=nc, _ipg=240, or a referer header).
        - Use scrape.do's playWithBrowser to click through any
          consent / region-select interstitial.
        - Worst case, drop LH_Sold=1 and use LH_Complete=1 alone,
          then filter to sold-only via the "Sold" badge presence
          inside each card block.

  - title: STRIPE_SECRET_KEY pasted value was wrong
    detail: >
      User had pasted a token starting "mk_..." into the
      STRIPE_SECRET_KEY Cloudflare secret. Need to re-paste the
      real sk_live_… (or sk_test_…) value via Cloudflare dashboard
      Settings → Variables and Secrets.

  - title: Stripe Customer Portal still needs one-time enable
    detail: >
      Settings → Billing → Customer portal → toggle Cancellations
      (+ Invoice history etc.) → Save. Once done, the Manage
      Subscription button works for existing subscribers.

  - title: PRODUCTHUNTLAUNCH coupon needs to be created in Stripe
    detail: >
      Code in app already passes allow_promotion_codes:true. The
      coupon itself (Type=Percentage, 100% off, Duration=Repeating,
      Number of months=1) and the linked promotion code
      "PRODUCTHUNTLAUNCH" must be created in Stripe Dashboard.

  - title: Checkout is currently OFF (CHECKOUT_ENABLED=false)
    detail: >
      Re-enable when taxes are sorted by either flipping the
      constant in server.js or setting Cloudflare env var
      CHECKOUT_ENABLED=true.

