session:
  date: "2026-06-13"
  branch: claude/sold-search-price-estimation-4f7bbo
  repo: peytonfrankecode/fbai
  topic: >
    Print-run-adjusted price estimate for the sold search bar — when a card has
    no sold sales at the exact print run searched, estimate its value from
    sales of the same card at OTHER print runs, adjusted for scarcity.

user_constraints:
  no_dev_tools:
    summary: >
      User has no terminal, curl, DevTools, console, or local checkout. They
      interact with the deployed site through the UI only and the codebase
      through Claude Code sessions. Run all commands in the sandbox; verify in
      the sandbox before pushing.

feature_overview: >
  Asked for: when a sold search returns no sales for the exact card (e.g. a
  /10), draw on other similar sales (e.g. a /25), adjust each comp's price for
  the print-run difference, use 3–5 cards, then show the sold prices used
  crossed against the resulting estimated price. Implemented across both sold
  search surfaces (main search bar → /api/direct-search, and the variant flow →
  /api/search).

implementation:
  server_js:
    new_helpers:
      ESTIMATE_SCARCITY_ALPHA: >
        0.65 — matches AP_SCARCITY_ALPHA (app.js) and the checklist estimator
        so the whole app values scarcity identically (a /25 ≈ 2x a /99, not 4x).
      parsePrintRunFromTitle(title): >
        Server mirror of the frontend parsePrintRun. Handles /99, 12/99 serial
        stamps, 1/1, one-of-one, "numbered to 99"; skips season ranges.
      buildSimilarPrintRunEstimate(query, results): >
        Only fires for serial-numbered queries. Uses extractSearchKeywords to
        keep comps matching the same card EXCEPT the print run (player anchor,
        year, set, color/parallel, grade, type), relaxing to the player anchor
        if the strict pass is empty. Keeps comps numbered to something OTHER
        than the target, sorts by scarcity proximity (closest = most reliable),
        takes the nearest 3–5, adjusts each by (compPR/targetPR)^0.65 clamped to
        [0.15, 12], and returns { value (median adjusted), low, high,
        targetPrintRun, sampleSize, alpha, comps[] } where each comp carries
        soldPrice, printRun, multiplier, adjustedPrice, rarer, date/img/url.
      hasExactPrintRunSales(query, results): >
        True when any result matches the query's exact print-run predicate (or
        no print run was requested). Gate so the estimate only appears when
        there are zero exact-PR sales.
    wired_into:
      - /api/search sold path — adds `estimate` to the JSON response (built from
        raw searchData.results) when hasExactPrintRunSales is false.
      - /api/direct-search sold path — same, on the main search bar surface.
    exports_added: [buildSimilarPrintRunEstimate, hasExactPrintRunSales, parsePrintRunFromTitle]

  frontend_app_js:
    buildSimilarEstimateSection(est, query): >
      Renders the estimate into the existing #approx-section: ESTIMATED VALUE
      badge, "No sold sales found for a /N — estimated from M similar sales",
      big ~$value, low/high, then a list of the comps used where each row
      crosses the struck-through actual sold price → the adjusted price (green
      up / red down arrow) with the comp's /print run and (rarer|more common)
      tag, plus the adjustment formula footnote.
    wired_into:
      - fetchDirectSearch — renders the estimate (takes priority over the
        broadened approximate-value block).
      - performSearch — hides #approx-section on reset; renders the estimate
        after the rate-limit check.

  style_css:
    added: >
      .est-comps / .est-comp / .est-comp-img / .est-comp-title /
      .est-comp-sub / .est-comp-prtag / .est-comp-prices / .est-comp-sold
      (struck-through) / .est-comp-cross (up green / down red) / .est-comp-adj
      (orange) + a mobile wrap rule. Reuses the existing .approx-* shell.

  cache_busts:
    - style.css?v=82 -> v=83
    - app.js?v=113 -> v=114

verification: >
  No automated suite in the repo. Extracted the new server helpers via the
  module exports and ran them against realistic titles: print-run parsing,
  player/color exclusivity (Jefferson + Silver excluded), unnumbered base
  excluded, /10 estimate (median ~$711 from /25,/50,/99 sales each adjusted up),
  /5 (rarer) pushing adjusted prices higher, no-serial → null, and the exact-PR
  gate returning true when /25 sales are present. node --check passes on
  server.js and public/app.js.

design_notes:
  - The estimate is print-run based (the user's concrete example). Grade/parallel
    differences are matched-on (kept identical), not numerically re-priced — same
    scope as the existing Auto-Pricer model.
  - Takes up to 5 of the closest comps; will show fewer (down to 1) rather than
    suppress the estimate entirely, with sampleSize surfaced for transparency.
  - Built from raw eBay results (pre price-outlier-filter); median over the
    adjusted comps keeps a single mis-list from skewing the value.

follow_up_round_2:
  user_feedback: >
    Estimate did well adjusting for similar print runs but doesn't change value
    for unnumbered cards; cap the Auto-Pricer sold comps at 10; only include
    comps with the same player name as the search; and balance for different
    sets (National Treasures worth more than Score).
  decisions:
    - scope: applied to BOTH the sold-search estimate and the Auto-Pricer.
    - set_values: built a curated, tweakable tier table; cross-set comps used
      only when same-set comps are scarce, with conservative clamps.
  changes:
    server_js:
      - SET_VALUE_TIERS + detectSetTier(text) + clampNum(): curated relative set
        weights (National Treasures/Flawless 8 … Score/Hoops 1). Ambiguous names
        (black/elite/one) intentionally omitted. detectSetTier returns the most
        specific named set { name, tier }.
      - Renamed buildSimilarPrintRunEstimate → buildSimilarCardEstimate. Now
        adjusts each comp by BOTH print run ((compPR/targetPR)^0.65) AND set
        (tier(targetSet)/tier(compSet), clamped 0.2–5). Requires a player anchor
        (only same-name comps). Handles unnumbered cards (set-only adjustment).
        Picks the 3–5 comps needing the least total adjustment. Returns
        targetSet, crossCard, adjustedForPrintRun, adjustedForSet + per-comp
        prMultiplier/setMultiplier/setName.
      - Renamed hasExactPrintRunSales → hasExactCardSales: true when a listing
        matches EVERY positive keyword (player/year/set/parallel/print run/grade).
        When false, the estimate fires — generalizes the trigger from print-run-
        only to "no exact card", so unnumbered/cross-set cases also estimate.
      - /api/auto-price/search: filters comps to the searched player's surname
        (anchored via extractPlayerName) and caps the returned items at 10.
      - exports updated: buildSimilarCardEstimate, hasExactCardSales,
        parsePrintRunFromTitle, detectSetTier.
    frontend_app_js:
      - Mirrored SET_VALUE_TIERS + detectSetTier + clampNum (kept in sync).
      - runAutoPricer: detects _apUserSet, caps comps at 10, stamps each comp
        with its detected set.
      - calculateApValue: per-comp adjustment now multiplies print-run × set
        multipliers; new method note for set balancing; breakdown table gained a
        Set column and a combined-adjustment tooltip; footer documents both
        formulas.
      - buildSimilarEstimateSection: adaptive copy (handles /N, set-only, or
        both), shows each comp's set chip when it differs, "adjusted to /N or
        set", and only lists the formulas actually applied.
    style_css: .est-comp-settag chip.
    cache_busts:
      - style.css?v=83 -> v=84
      - app.js?v=114 -> v=115
  verification: >
    Re-ran the extracted server helpers: same-set /10 print-run estimate
    (~$711); unnumbered National Treasures estimated from Score/Prizm/Donruss
    sales (set-only lift, median $50, wrong player excluded); combined NT /10
    from a Prizm /25 ($100 → ~$580 via ×1.81 PR × ×3.20 set); no-player → null;
    exact-card present → no estimate. node --check passes on both files.

follow_up_round_3:
  user_feedback: >
    Add a multiplier for the unnumbered↔numbered transition; and on a screenshot
    a /50 sold $50 while a /25 sold $35, giving a /10 comp adjusted to $63.49 —
    the /25 seems low, so the estimate needs a "neutralizer".
  changes:
    unnumbered_multiplier:
      - UNNUMBERED_EFFECTIVE_PR (=250, server + app) + effectivePrintRun()/
        apEffectivePR(): unnumbered cards now get an effective print run so the
        same 0.65 power law yields a real multiplier across the
        numbered/unnumbered boundary (a /25 ≈ (250/25)^0.65 ≈ 4.5× an
        unnumbered; an unnumbered target valued down from numbered comps).
    neutralizer:
      - ESTIMATE_NEUTRALIZER / AP_NEUTRALIZER (=0.45). Each comp's implied
        price-scale C = (set-normalized price) × effPR^0.65 is blended toward the
        median consensus (geometric: C' = consensus^s × C^(1−s)) BEFORE valuing
        at the target print run. A low/high single sale (the screenshot /25) is
        pulled toward what the other comps imply, so it can't swing the estimate.
        s=0 recovers the old independent-scaling behavior.
      - buildSimilarCardEstimate refactored to the two-pass scale/consensus
        pipeline (set → effPR scale → consensus → neutralize → value@target);
        returns `neutralized`. calculateApValue mirrors it (operates over the
        user-selected comps). Median is still the aggregator, so outliers are
        doubly contained.
    ui:
      - AP: new "comps neutralized toward consensus" method note; breakdown
        footer documents effective-/250 + neutralizer.
      - Sold estimate: footnote mentions unnumbered ~/250 + neutralizer when
        applied.
    cache_busts: [app.js?v=115 -> v=116]
  verification: >
    Screenshot case (/10 from /50@$50 + /25@$35): /25 now adjusts to $78.91
    (lifted from $63.49 toward the /50's implied level), /50 to $123, value $101.
    Unnumbered target from numbered comps values down (×0.23–0.34); /25 from an
    unnumbered $10 comp → ×4.47. Three consistent /25 sales → exactly $40 (no
    distortion). A wild /99 $500 outlier no longer drives the value (median $128).
    node --check passes.

follow_up_round_4:
  user_feedback: >
    Sold price parsing wrong — a card shows a sold price of $15,210 when it's
    really ~$50 (i.e. $152.10 read as 15210).
  diagnosis: >
    assembleListing did parseFloat(priceStr.replace(/[^0-9.]/g,'')) on the
    tag-stripped price text. When eBay renders cents in a separate node with no
    literal decimal ("$152<sup>10</sup>"), stripping tags concatenates the
    digits → "15210". (Thousands commas and a second/struck price could mangle
    it too.)
  changes:
    server_js:
      - classInnerRaw(block, cls): like classInner but returns RAW inner HTML so
        the price parser can see the dollars/cents node split.
      - parsePriceHtml(rawHtml): (1) first well-formed money value with cents
        (commas stripped); (2) reassemble split "$dollars<tag>cc" → dollars.cc;
        (3) else first integer (whole-dollar listing). Replaces the naive strip.
      - resolveCard now parses price via parsePriceHtml(rawPrice element), with a
        block-level "$N(.NN)" fallback; returns a normalized priceStr.
      - exported parsePriceHtml.
  verification: >
    Unit tests pass for: plain $50.00; the bug "$152<sup>10</sup>"→152.10;
    "$50<span>00</span>"→50; "$1,250.00"→1250; two prices→first; whole-dollar
    "$50"→50; "$1,500"→1500 (NOT 15.00); nested POSITIVE span; price+shipping
    junk→50. Server-only change (no asset cache bump).
  note: >
    If a value still looks wrong after this (e.g. shows the struck "was" price
    instead of the sold price), grab the card's title + price via Settings →
    Test Keys (firstCardExtract) so the exact markup can be targeted.

follow_up_round_5:
  user_feedback: >
    Add the alternate (estimated) sold price to the portfolio; let users edit
    saved collection cards; and make the alternate sold pricer drive Refresh
    Values in the collection too.
  changes:
    alternate_price_in_portfolio:
      - _fetchCardComps now returns data.estimate; valueCardAt and
        refreshPortfolioValues persist it on the card (c.estimate).
      - recomputeCardValue PREFERS the estimate when present: no exact sale →
        c.estValue = estimate.value, c.isEstimate = true (the server returns the
        relaxed similar comps as results too, so we must NOT median those raw,
        differently-numbered listings — the adjusted estimate is the value).
        Exact comps still use the median.
      - refreshPortfolioValues counts a card valued when c.estValue > 0 (exact OR
        estimate), so the alternate pricer participates in Refresh Values.
      - Portfolio tile shows "~$X" + an "EST" badge; summary valuedCount and the
        comps modal are estimate-aware (modal shows each similar sale crossed
        from its sold price → adjusted price, with print-run/set tags).
    edit_cards:
      - New #edit-card-modal + openEditCard/closeEditCard/saveEditCard. Edits
        player/year/brand/set/parallel/print run/card #/condition/paid/notes
        (manual cards keep a free-text name). "Re-price after saving" checkbox
        clears stale comps/estimate and re-values via valueCardAt. Pencil edit
        button added to each portfolio card's actions.
    css: pf-est-badge, pf-edit-btn, ec-grid/ec-label/ec-check (edit form),
      ccm-est-note + gc-comp-strike/arrow/adj (estimate breakdown in modal).
    cache_busts: [app.js?v=116 -> v=117, style.css?v=84 -> v=85]
  verification: >
    node --check passes on both files. Server estimate already unit-tested;
    client mirrors the same data. (No automated browser test in repo.)

grant_pro_access:
  request: Give full Pro access to the account named 'thecardhuddle'.
  context: >
    Pro paywalls are real again (hasPro() checks sub.plan==='pro' &&
    status==='active', synced from /api/stripe/subscription which reads the
    KV-backed subscriptions store). Production accounts live in Cloudflare KV —
    can't be edited from the sandbox — so the durable way to grant Pro is a
    code-level allowlist that deploys through the normal push pipeline.
  implementation:
    server_js:
      - PRO_GRANT_USERS = new Set(['thecardhuddle']) — staff/owner accounts
        always treated as active permanent 'pro' (lowercased compare).
      - getEffectiveSubscription(username): layers the permanent pro grant over
        any real record for allowlisted users; returns the real record otherwise.
      - Wired into the three subscription read paths: GET /api/auth/me,
        GET /api/stripe/subscription (drives the frontend hasPro() sync), and
        POST /api/stripe/buy-slot (extra-slot gate).
      - exports add getEffectiveSubscription + PRO_GRANT_USERS.
  verification: >
    getEffectiveSubscription('thecardhuddle') and 'TheCardHuddle' both →
    { plan:'pro', status:'active', permanent:true }; 'someoneelse' → null.
  user_note: >
    The account must exist (register/login as 'thecardhuddle'); Pro activates on
    the next login/refresh once syncSubscriptionStatus fetches the grant. To
    grant more accounts later, add usernames to PRO_GRANT_USERS.

