# ============================================================
# Live ops issue raised by user (not a code bug)
# ============================================================
ops:
  - title: "Stripe checkout: 'Stripe isn't configured on this environment'"
    diagnosis: >
      The error message at public/app.js:2739 is honest — the live
      worker is reporting stripeEnabled:false because the
      STRIPE_SECRET_KEY (and likely STRIPE_PUBLISHABLE_KEY +
      STRIPE_WEBHOOK_SECRET) are not set as Cloudflare Worker secrets.
      Same "still_open" item from the 2026-05-18 chat summary.
    user_action_required:
      where: Cloudflare dashboard (NOT wrangler CLI — user has no terminal).
      path: >
        Workers & Pages → the-card-huddle → Settings →
        Variables and Secrets → Add → Type: Secret.
      keys_to_add:
        - STRIPE_SECRET_KEY        # sk_live_… (or sk_test_… while testing)
        - STRIPE_PUBLISHABLE_KEY   # pk_live_…
        - STRIPE_WEBHOOK_SECRET    # whsec_… from Stripe Dashboard → Webhooks
      stripe_webhook_endpoint: https://thecardhuddle.com/api/stripe/webhook
      stripe_webhook_events:
        - checkout.session.completed
        - customer.subscription.updated
        - customer.subscription.deleted
    verify_no_terminal_needed:
      url: https://thecardhuddle.com/api/stripe/config
      expected: '{ "publishableKey": "pk_...", "enabled": true }'
    notes: >
      User hit https://thecardhuddle.com/api/stripe/webhook in a
      browser and got 404. That's correct — the route is app.post
      only; a browser GET will 404. Stripe itself will POST with a
      valid signature, which is what the handler verifies.

