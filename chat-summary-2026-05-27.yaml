# ============================================================
# IMPORTANT — USER CONSTRAINTS (read me first)
# ============================================================
user_constraints:
  no_dev_tools:
    summary: >
      The user does NOT have access to web developer tools. That means:
      no terminal / shell, no curl, no wrangler CLI, no node, no
      browser DevTools, no SSH, no local checkout. They interact with
      the site through the UI only, and with the codebase through
      Claude Code sessions.
    do_not_do:
      - Tell the user to "run wrangler secret put X" themselves.
      - Tell the user to curl an endpoint or inspect Network in DevTools.
      - Tell the user to open a terminal or paste a shell command.
      - Tell the user to "check the console" — they have no console.
      - Send commands like `git`, `npm`, `node`, `wrangler` for them
        to execute. Anything that needs running, Claude runs.
    do_instead:
      - For Cloudflare secrets (Stripe, OAuth, eBay): tell the user
        exactly where to click in the Cloudflare dashboard
        (Workers & Pages → the-card-huddle → Settings → Variables and
        Secrets → "Add" → set type to "Secret"), and explain what to
        paste. They can do that in a browser, not a terminal.
      - For Stripe webhook setup: walk them through the Stripe
        Dashboard UI (Developers → Webhooks → Add endpoint).
      - For verifying a config landed: give them a URL they can paste
        in the browser address bar (e.g. /api/stripe/config returning
        enabled:true), not a curl command.
      - For testing changes: if it can be tested by clicking around
        the live site, describe what to click. Otherwise verify in the
        Claude Code sandbox before pushing.

