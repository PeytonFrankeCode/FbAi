how_it_works_refs:
  floor_chat: >
    Ephemeral broadcast over the FloorRoom Durable Object WebSocket. Client
    floorChatSend -> sendWs({t:'chat',text}); worker FloorRoom screens
    (moderateText) + stripBidi + broadcasts {t:'chat',id,name,emoji,text,at};
    onFloorChat pushes to floorChatLog (cap 120) and renderFloorChat renders
    oldest->newest. Sender sees their own line (broadcast includes them).
  direct_messages: >
    Persisted server-side (server.js /api/dm/*, KV blob keyed userA|userB).
    Real-time fan-out - worker POSTs to recipient + sender UserInbox DOs after
    /api/dm/send; client per-user socket (/api/dm/ws?token=) -> handleIncomingDm.
    Unread badge (.floor-dm-badge) via /api/dm/unread.
  deploy: >
    .github/workflows/deploy.yml deploys to Cloudflare Workers on push to MAIN
    only (wrangler-action). Branch work must be merged to main (PRs) to go live.

